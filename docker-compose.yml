services:
  postgres:
    image: postgres:16
    container_name: platform_postgres
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local_dev_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
